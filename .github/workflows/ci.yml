name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  bridge:
    name: ailog ↔ localchain bridge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout ailog
        uses: actions/checkout@v4
        with:
          path: ailog

      - name: Checkout local-chain (sibling)
        uses: actions/checkout@v4
        with:
          repository: Mby159/local-chain
          path: local-chain

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run bridge tests
        working-directory: ailog
        env:
          LOCAL_CHAIN_REPO: ${{ github.workspace }}/local-chain
        run: python -m unittest tests.test_localchain_bridge -v
